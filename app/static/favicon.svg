<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="PynanceParser favicon">
  <rect width="100%" height="100%" rx="12" ry="12" fill="#4db6ac"/>
  <!-- stylized banknote -->
  <rect x="8" y="18" width="48" height="28" rx="4" ry="4" fill="#ffffff" stroke="#2e7d6c" stroke-width="2" />
  <!-- central currency sign -->
  <text x="32" y="34" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#2e7d6c" text-anchor="middle" dominant-baseline="central">€</text>
  <!-- small gold coin accent -->
  <circle cx="48" cy="20" r="6" fill="#ffd54f" stroke="#e6b800" stroke-width="1" />
  <text x="48" y="20" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle" dominant-baseline="central">€</text>
</svg>
